<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

  <!-- SEO — injected at runtime by courses-app.js from COURSE_DATA -->
  <title id="page-title">Ai8V | Mind &amp; Machine — Explore Courses</title>
  <meta name="description"
        id="page-desc"
        content="Explore our catalog of expert-led online courses in Development, Design, Health, Marketing and more. Filter by category, level or rating and start learning today.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" id="page-canonical" href="https://ai8v.com/course/">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         id="og-url"       content="https://ai8v.com/course/">
  <meta property="og:title"       id="og-title"     content="Ai8V | Mind &amp; Machine — Explore Courses">
  <meta property="og:description" id="og-desc"      content="Explore expert-led online courses. Filter by category, level or rating and start learning today.">
  <meta property="og:image"       id="og-image"     content="https://ai8v.com/assets/img/og-image.png">
  <meta property="og:site_name"   id="og-site-name" content="Ai8V | Mind &amp; Machine">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       id="tw-title" content="Ai8V | Mind &amp; Machine — Explore Courses">
  <meta name="twitter:description" id="tw-desc"  content="Explore expert-led online courses. Filter by category, level or rating and start learning today.">
  <meta name="twitter:image"       id="tw-image" content="https://ai8v.com/assets/img/og-image.png">

  <!-- hreflang -->
  <link rel="alternate" hreflang="en"        id="hreflang-en"      href="https://ai8v.com/course/">
  <link rel="alternate" hreflang="ar"        id="hreflang-ar"      href="https://ai8v.com/ar/course/">
  <link rel="alternate" hreflang="x-default" id="hreflang-default" href="https://ai8v.com/course/">

  <!-- CSP — font-src 'self' for Inter self-hosted -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 script-src 'self';
                 style-src 'self' https://cdn.jsdelivr.net;
                 font-src 'self' https://cdn.jsdelivr.net;
                 img-src 'self' data:;
                 connect-src 'self';
                 frame-src https://www.google.com https://maps.google.com;
                 form-action 'none';">

  <!-- JSON-LD injected by courses-app.js -->

  <!-- Favicons -->
  <link rel="apple-touch-icon" type="image/png" sizes="180x180" href="/assets/img/fav180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/fav32.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/fav32D.png"
        media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/fav16.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/img/fav16D.png"
        media="(prefers-color-scheme: dark)">

  <!-- Preload critical font — path from /course/ -->
  <link rel="preload" href="/assets/fonts/inter-variable.woff2"
        as="font" type="font/woff2" crossorigin="anonymous">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/assets/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/css/courses.css">
  <link rel="stylesheet" href="/assets/css/components.css">
</head>

<body>

  <!-- Skip to content -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- ── Navbar ── -->
  <nav class="navbar navbar-expand-lg sticky-top site-navbar" aria-label="Main navigation">
    <div class="container">
      <a id="nav-brand-link" class="navbar-brand site-brand" href="/">
        <span class="site-brand-icon" aria-hidden="true">
          <img src="/assets/img/logo-icon.png"
              srcset="/assets/img/logo-icon.png 1x, /assets/img/logo-icon-2x.png 2x"
              alt="" class="brand-logo" width="32" height="32">
        </span>
        <span id="nav-brand-name">Ai8V</span>
      </a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#main-nav"
              aria-controls="main-nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main-nav">
        <ul class="navbar-nav ms-auto me-3 gap-1">
          <li class="nav-item"><a class="nav-link" id="nav-home" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" id="nav-services" href="/services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" id="nav-courses" href="/course/">Courses</a></li>
          <li class="nav-item"><a class="nav-link" id="nav-about" href="/about.html">About</a></li>
        </ul>
        <div id="lang-switcher-slot"></div>
      </div>
    </div>
  </nav>

  <main id="main-content" class="page-container">

    <!-- ── Page Header ── -->
    <header class="page-header">
      <div>
        <h1 class="page-title">Explore Courses</h1>
        <nav class="breadcrumb-nav" aria-label="Breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <a id="breadcrumb-home" href="/">Home</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">
              <span id="breadcrumb-current">Courses</span>
            </li>
          </ol>
        </nav>
      </div>
    </header>

    <!-- ── Layout ── -->
    <div class="row g-4">

      <!-- Sidebar — desktop -->
      <aside id="desktop-filters-slot"
             class="col-lg-3 d-none d-lg-block sidebar"
             aria-label="Course filters">
      </aside>

      <!-- Content area -->
      <div id="content-area" class="col-lg-9">

        <!-- Toolbar -->
        <div class="toolbar" role="search">
          <p id="results-text"
             class="results-text mb-0"
             aria-live="polite"
             aria-atomic="true">Loading</p>

          <div class="d-flex align-items-center gap-2">
            <label id="search-label" class="visually-hidden" for="search-input">
              Search courses
            </label>
            <input id="search-input"
                   class="search-input"
                   type="search"
                   placeholder="Search courses"
                   autocomplete="off"
                   aria-label="Search courses">

            <div class="dropdown">
              <button id="sort-dropdown"
                      class="btn sort-toggle dropdown-toggle"
                      type="button"
                      data-bs-toggle="dropdown"
                      aria-expanded="false"
                      aria-label="Sort courses">
                <span class="d-none d-sm-inline sort-label">Top Rated</span>
                <i class="d-sm-none bi bi-sort-down" aria-hidden="true"></i>
              </button>
              <ul id="sort-dropdown-menu"
                  class="dropdown-menu sort-menu dropdown-menu-end"
                  role="menu"
                  aria-label="Sort options">
              </ul>
            </div>
          </div>
        </div>

        <!-- Courses grid -->
        <h2 class="visually-hidden" id="courses-list-heading">Course Results</h2>
        <div id="courses-grid"
             class="row g-4"
             aria-live="polite"
             aria-atomic="true">
        </div>

        <!-- Pagination -->
        <nav aria-label="Course pages">
          <ul id="pagination-bar"
              class="pagination justify-content-center mt-4 gap-2">
          </ul>
        </nav>

      </div>
    </div>

  </main><!-- /#main-content -->


  <!-- ── Mobile Offcanvas filters ── -->
  <div id="offcanvas-filters"
       class="offcanvas offcanvas-start mobile-offcanvas"
       tabindex="-1"
       aria-labelledby="offcanvas-title">
    <div class="offcanvas-header">
      <h2 id="offcanvas-title" class="offcanvas-title">Filters</h2>
      <button class="btn-close"
              type="button"
              data-bs-dismiss="offcanvas"
              aria-label="Close filters"></button>
    </div>
    <div id="mobile-filters-slot" class="offcanvas-body"></div>
  </div>


  <!-- ── FAB — mobile filter trigger ── -->
  <button id="floating-filter-btn"
          class="d-lg-none floating-fab"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvas-filters"
          aria-label="Open course filters"
          aria-controls="offcanvas-filters">
    <i class="bi bi-funnel-fill" aria-hidden="true"></i>
  </button>


  <!-- ── Footer ── -->
  <footer class="site-footer mt-3">
    <div class="container site-footer-top">
      <div class="row g-4">
        <div class="col-lg-4 col-md-6">
          <p class="site-footer-brand">
            <img src="/assets/img/logo-icon.png"
                srcset="/assets/img/logo-icon.png 1x, /assets/img/logo-icon-2x.png 2x"
                alt="" class="brand-logo me-2" width="28" height="28" loading="lazy"
                aria-hidden="true">
            <span id="footer-brand-name">Ai8V</span>
          </p>
          <p id="footer-tagline" class="site-footer-tagline"></p>
          <div id="footer-social-links" class="footer-social-icons"></div>
        </div>
        <div class="col-lg-2 col-md-6">
          <p id="footer-heading-quicklinks" class="site-footer-col-title">Quick Links</p>
          <ul class="site-footer-links">
            <li><a id="footer-link-home" href="/"><span id="footer-link-home-text">Home</span></a></li>
            <li><a id="footer-link-services" href="/services.html"><span id="footer-link-services-text">Services</span></a></li>
            <li><a id="footer-link-courses" href="/course/" class="site-footer-link-active"><span id="footer-link-courses-text">Courses</span></a></li>
            <li><a id="footer-link-about" href="/about.html"><span id="footer-link-about-text">About</span></a></li>
          </ul>
        </div>
        <div class="col-lg-2 col-md-6">
          <p id="footer-heading-products" class="site-footer-col-title">Courses</p>
          <ul id="footer-categories" class="site-footer-links"></ul>
        </div>
        <div class="col-lg-2 col-md-6">
          <p id="footer-heading-legal" class="site-footer-col-title">Legal</p>
          <ul class="site-footer-links">
            <li><a id="footer-link-privacy" href="/legal/privacy.html"><span class="footer-link-text">Privacy Policy</span></a></li>
            <li><a id="footer-link-terms" href="/legal/terms.html"><span class="footer-link-text">Terms of Use</span></a></li>
          </ul>
        </div>
        <div class="col-lg-2 col-md-6" id="footer-map-slot" data-heading-class="site-footer-col-title"></div>
      </div>
    </div>
    <div class="site-footer-bottom">
      <span id="footer-copyright"></span>
    </div>
  </footer>

  <!-- ── Toast Container ── -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3"
       aria-live="polite"
       aria-atomic="true">
  </div>
  
  <!-- Scripts — deferred, non-blocking -->
  <script src="/assets/bootstrap/js/bootstrap.min.js"  defer></script>
  <script src="/assets/js/utils.js"                    defer></script>
  <script src="/assets/js/courses-data.js"             defer></script>
  <script src="/assets/js/shared-page.js"              defer></script>
  <script src="/assets/js/courses-app.js"              defer></script>
  <script src="/assets/js/ratings-system.js"           defer></script>

</body>

</html>
