<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

  <!--
    SEO: title + description + canonical + OG + Twitter
    Fallback values here — course-details-app.js injects
    final per-course values from COURSE_DATA at runtime.
  -->
  <title id="page-title">Course Details — Ai8V | Mind &amp; Machine</title>
  <meta name="description"
        id="page-desc"
        content="Explore this expert-led online course. Learn at your own pace with lifetime access and dedicated support.">
  <meta name="robots" id="page-robots" content="index, follow">
  <link rel="canonical" id="page-canonical"
        href="https://ai8v.com/course/course-details/">

  <!-- Open Graph -->
  <meta property="og:type"        content="article">
  <meta property="og:url"         id="og-url"       content="https://ai8v.com/course/course-details/">
  <meta property="og:title"       id="og-title"     content="Course Details — Ai8V | Mind &amp; Machine">
  <meta property="og:description" id="og-desc"      content="Explore this expert-led online course. Learn at your own pace with lifetime access.">
  <meta property="og:image"       id="og-image"     content="https://ai8v.com/assets/img/og-image.png">
  <meta property="og:site_name"   id="og-site-name" content="Ai8V | Mind &amp; Machine">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       id="tw-title" content="Course Details — Ai8V | Mind &amp; Machine">
  <meta name="twitter:description" id="tw-desc"  content="Explore this expert-led online course. Learn at your own pace with lifetime access.">
  <meta name="twitter:image"       id="tw-image" content="https://ai8v.com/assets/img/og-image.png">

  <!-- hreflang — updated per-course by JS -->
  <link rel="alternate" hreflang="en"        id="hreflang-en"      href="https://ai8v.com/course/course-details/">
  <link rel="alternate" hreflang="ar"        id="hreflang-ar"      href="https://ai8v.com/ar/course/course-details/">
  <link rel="alternate" hreflang="x-default" id="hreflang-default" href="https://ai8v.com/course/course-details/">

  <!-- CSP — includes 'unsafe-inline' for dynamic styles -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 font-src 'self' https://cdn.jsdelivr.net;
                 img-src 'self' data: https://img.youtube.com;
                 connect-src 'self';
                 frame-src https://www.google.com https://maps.google.com https://www.youtube-nocookie.com https://drive.google.com;
                 form-action 'none';">

  <!-- JSON-LD injected by course-details-app.js per course -->

  <!-- Favicons -->
  <link rel="apple-touch-icon" type="image/png" sizes="180x180"
        href="/assets/img/fav180.png">
  <link rel="icon" type="image/png" sizes="32x32"
        href="/assets/img/fav32.png">
  <link rel="icon" type="image/png" sizes="32x32"
        href="/assets/img/fav32D.png"
        media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="16x16"
        href="/assets/img/fav16.png">
  <link rel="icon" type="image/png" sizes="16x16"
        href="/assets/img/fav16D.png"
        media="(prefers-color-scheme: dark)">

  <!-- Preload critical font — path from /course/course-details/ -->
  <link rel="preload" href="/assets/fonts/inter-variable.woff2"
        as="font" type="font/woff2" crossorigin="anonymous">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/assets/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/css/courses.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/course-details.css">
</head>

<body>

  <!-- Skip to content -->
  <a href="#app" class="skip-link">Skip to main content</a>

  <!-- App container — all content built dynamically by course-details-app.js -->
  <main id="app" aria-label="Course details">
    <noscript>
      <div style="text-align:center; padding:4rem 1rem; color:#86efac;">
        <p style="font-size:1.2rem; font-weight:700;">
          JavaScript Required
        </p>
        <p style="color:#6b7f75;">
          Please enable JavaScript to view course details.
        </p>
        <a href="/course/"
           style="color:#34d399; text-decoration:underline;">
          ← Back to Courses
        </a>
      </div>
    </noscript>
  </main>
  <!-- ── Footer ── -->
<footer class="site-footer mt-5">
  <div class="container site-footer-top">
    <div class="row g-4">
      <div class="col-lg-4 col-md-6">
        <p class="site-footer-brand">
            <img src="/assets/img/logo-icon.png"
                srcset="/assets/img/logo-icon.png 1x, /assets/img/logo-icon-2x.png 2x"
                alt="" class="brand-logo me-2" width="28" height="28" loading="lazy"
                aria-hidden="true">
          <span id="footer-brand-name">Ai8V</span>
        </p>
        <p id="footer-tagline" class="site-footer-tagline"></p>
        <div id="footer-social-links" class="footer-social-icons"></div>
      </div>
      <div class="col-lg-2 col-md-6">
        <p id="footer-heading-quicklinks" class="site-footer-col-title">Quick Links</p>
        <ul class="site-footer-links">
          <li><a id="footer-link-home" href="/"><span id="footer-link-home-text">Home</span></a></li>
          <li><a id="footer-link-services" href="/services.html"><span id="footer-link-services-text">Services</span></a></li>
          <li><a id="footer-link-courses" href="/course/"><span id="footer-link-courses-text">Courses</span></a></li>
          <li><a id="footer-link-about" href="/about.html"><span id="footer-link-about-text">About</span></a></li>
        </ul>
      </div>
      <div class="col-lg-2 col-md-6">
        <p id="footer-heading-products" class="site-footer-col-title">Courses</p>
        <ul id="footer-categories" class="site-footer-links"></ul>
      </div>
      <div class="col-lg-2 col-md-6">
        <p id="footer-heading-legal" class="site-footer-col-title">Legal</p>
        <ul class="site-footer-links">
          <li><a id="footer-link-privacy" href="/legal/privacy.html"><span class="footer-link-text">Privacy Policy</span></a></li>
          <li><a id="footer-link-terms" href="/legal/terms.html"><span class="footer-link-text">Terms of Use</span></a></li>
        </ul>

      <div class="col-lg-2 col-md-6" id="footer-map-slot" data-heading-class="site-footer-col-title"></div>
    </div>
  </div>
  <div class="site-footer-bottom">
    <span id="footer-copyright"></span>
  </div>
</footer>

<!-- ── Toast Container ── -->
<div class="toast-container position-fixed bottom-0 end-0 p-3"
     aria-live="polite" aria-atomic="true"></div>

  <!-- Scripts — deferred, non-blocking -->
  <script src="/assets/bootstrap/js/bootstrap.min.js"    defer></script>
  <script src="/assets/js/utils.js"                      defer></script>
  <script src="/assets/js/courses-data.js"               defer></script>
  <script src="/assets/js/shared-page.js"                defer></script>
  <script src="/assets/js/ratings-system.js"             defer></script>
  <script src="/assets/js/course-details-app.js"         defer></script>

</body>

</html>
